<!DOCTYPE html>
<html>
<head>
    <title>Simple Cards</title>
    <style>
        body {
            background: #f2f2f2;
            font-family: Arial;
            padding: 20px;
        }

        .main {
            display: flex;
            gap: 20px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .card {
            width: 300px;
            background: white;
            border-radius: 10px;
            overflow: hidden;
        }

        .card img {
            width: 100%;
            height: 180px;
        }

        .card h2 {
            padding: 10px;
        }

        .card p {
            padding: 0 10px 10px;
            font-size: 14px;
        }

        .btn {
            margin: 10px;
            padding: 8px 12px;
            background: black;
            color: white;
            border: none;
            border-radius: 5px;
        }
    </style>
</head>

<body>

<div class="main">

    <div class="card">
        <img src="https://picsum.photos/300/200?1">
        <h2>Card 1</h2>
        <p>Lorem ipsum dolor sit amet, consectetur adipiscing elit.</p>
        <button class="btn">Read More</button>
    </div>

    <div class="card">
        <img src="https://picsum.photos/300/200?2">
        <h2>Card 2</h2>
        <p>Lorem ipsum dolor sit amet, consectetur adipiscing elit.</p>
        <button class="btn">Read More</button>
    </div>

    <div class="card">
        <img src="https://picsum.photos/300/200?3">
        <h2>Card 3</h2>
        <p>Lorem ipsum dolor sit amet, consectetur adipiscing elit.</p>
        <button class="btn">Read More</button>
    </div>

</div>

</body>
</html>
