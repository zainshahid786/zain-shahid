<!DOCTYPE html>
<html>
<head>
<title>Registration Form</title>

<style>

body{
font-family: Arial;
background: linear-gradient(to right,#6ea6d6,#a65acb);
}

table{
background:white;
width:600px;
margin:100px auto;
padding:20px;
border-radius:6px;
}

input[type=text],
input[type=email],
input[type=password]{
width:90%;
padding:8px;
margin-top:5px;
margin-bottom:10px;
border:1px solid #ccc;
border-radius:4px;
}

button{
width:100%;
padding:10px;
border:none;
color:white;
font-size:16px;
border-radius:5px;
background: linear-gradient(to right,#6ea6d6,#a65acb);
}

</style>
</head>

<body>

<form>

<table>

<tr>
<th colspan="2" align="left"><h2>Registration</h2></th>
</tr>

<tr>
<td>Full Name</td>
<td>Username</td>
</tr>

<tr>
<td><input type="text" placeholder="Enter your name"></td>
<td><input type="text" placeholder="Enter your username"></td>
</tr>

<tr>
<td>Email</td>
<td>Phone Number</td>
</tr>

<tr>
<td><input type="email" placeholder="Enter your email"></td>
<td><input type="text" placeholder="Enter your number"></td>
</tr>

<tr>
<td>Password</td>
<td>Confirm Password</td>
</tr>

<tr>
<td><input type="password" placeholder="Enter password"></td>
<td><input type="password" placeholder="Confirm password"></td>
</tr>

<tr>
<td colspan="2">Gender</td>
</tr>

<tr>
<td colspan="2">
<input type="radio" name="g"> Male
<input type="radio" name="g"> Female
<input type="radio" name="g"> Prefer not to say
</td>
</tr>

<tr>
<td colspan="2">
<button>Register</button>
</td>
</tr>

</table>

</form>

</body>
</html>
